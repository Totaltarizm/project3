name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Джоба для лінтера (перевірка коду)
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run HTML Hint (Linter for your site)
        run: |
          # Встановлюємо простий лінтер для HTML
          npm install -g htmlhint
          htmlhint index.html

  # 2. Джоба для збірки та пушу Docker image
  build-and-push:
    needs: linter # Запускати тільки якщо лінтер пройшов успішно
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Дозвіл на запис у GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/totaltarizm/project3:latest

   test-quality:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Container for Testing
        run: |
          docker run -d -p 8081:80 --name test_app ghcr.io/totaltarizm/project3:latest
          sleep 5

      - name: Run k6 3-in-1 Tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js

      - name: Stop and Cleanup
        if: always() # Видалити контейнер навіть якщо тести впали
        run: docker rm -f test_app