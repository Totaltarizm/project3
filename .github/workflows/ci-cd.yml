name: CI/CD Pipeline # Назва всього процесу автоматизації

on:
  push:
    branches: [ "main" ] # Спрацьовує при кожному пуші в гілку main
  pull_request:
    branches: [ "main" ]

jobs:
  # ЕТАП 1: Перевірка якості коду (Static Analysis)
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run HTML Hint
        run: |
          npm install -g htmlhint
          htmlhint index.html # Перевірка HTML на помилки синтаксису

  # ЕТАП 2: Збірка та публікація образу (Containerization)
  build-and-push:
    needs: linter # Почнеться тільки якщо лінтер пройшов успішно
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Дозвіл на запис у GitHub Packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true # Відправляємо зібраний образ у хмару
          tags: ghcr.io/${{ github.repository_owner }}/project3:latest

  # ЕТАП 3: Автоматизоване тестування (Dynamic Testing)
  test-quality:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Container for Testing
        run: |
          # Запускаємо наш свіжозібраний образ у фоновому режимі
          docker run -d -p 8081:80 --name test_app ghcr.io/${{ github.repository_owner }}/project3:latest
          # Важливо: чекаємо, поки сервер Nginx ініціалізується всередині контейнера
          sleep 10 

      - name: Run k6 Load Tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js
        # Ми прибрали --network, щоб не було помилки "unknown flag"
        # k6 за замовчуванням зможе достукатися до порту 8081 на localhost раннера

      - name: Show logs if failed
        if: failure() # Виконається лише якщо тести впали
        run: docker logs test_app

      - name: Stop and Cleanup
        if: always() # Виконується завжди, щоб не лишати "сміття" в системі
        run: docker rm -f test_app || true